<!DOCTYPE html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <link rel="icon" type="image/png" sizes="256x256" href="public/icons/256x256.png">
    <link rel="icon" type="image/ico" href="public/icons/icon.ico">

    <!-- <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"> -->


    <style>
        body {
            background-color: #ffffff !important;
        }
        #initial-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            margin: 0;
            padding: 0;
            opacity: 0;
            animation: fadeIn 0.3s ease-in forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
        #initial-loading-overlay.fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }
        #initial-loading-spinner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            margin-bottom: 20px;
            transform: translateZ(0);
            will-change: transform;
            isolation: isolate;
        }
        #initial-loading-text {
            
            text-align: center;
            font-size: 18px;
            color: #333;
            font-family: 'Inter', sans-serif;
            height: 20px;
            line-height: 20px;
            margin: 0;
            padding: 0;
            margin-top: 10px;
        
        }
        #initial-loading-version {
           
            text-align: center;
            font-size: 14px;
            color: #333;
            font-family: 'Inter', sans-serif;
            height: 20px;
            line-height: 20px;
            margin: 0;
            padding: 0;
            min-height: 20px;
         
           
        }





        .loader {
            color: #099966;
            font-size: 45px;
            text-indent: -9999em;
            overflow: hidden;
            width: 1em;
            height: 1em;
            border-radius: 50%;
            position: relative;
            transform: translateZ(0);
            will-change: transform, box-shadow;
            animation: mltShdSpin 1.7s infinite ease, round 1.7s infinite ease;
        }
        #initial-loading-icon {
            position: absolute;
            width: 30px;
            height: 30px;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes mltShdSpin {
            0% {
            box-shadow: 0 -0.83em 0 -0.4em,
            0 -0.83em 0 -0.42em, 0 -0.83em 0 -0.44em,
            0 -0.83em 0 -0.46em, 0 -0.83em 0 -0.477em;
            }
            5%,
            95% {
            box-shadow: 0 -0.83em 0 -0.4em, 
            0 -0.83em 0 -0.42em, 0 -0.83em 0 -0.44em, 
            0 -0.83em 0 -0.46em, 0 -0.83em 0 -0.477em;
            }
            10%,
            59% {
            box-shadow: 0 -0.83em 0 -0.4em, 
            -0.087em -0.825em 0 -0.42em, -0.173em -0.812em 0 -0.44em, 
            -0.256em -0.789em 0 -0.46em, -0.297em -0.775em 0 -0.477em;
            }
            20% {
            box-shadow: 0 -0.83em 0 -0.4em, -0.338em -0.758em 0 -0.42em,
            -0.555em -0.617em 0 -0.44em, -0.671em -0.488em 0 -0.46em, 
            -0.749em -0.34em 0 -0.477em;
            }
            38% {
            box-shadow: 0 -0.83em 0 -0.4em, -0.377em -0.74em 0 -0.42em,
            -0.645em -0.522em 0 -0.44em, -0.775em -0.297em 0 -0.46em, 
            -0.82em -0.09em 0 -0.477em;
            }
            100% {
            box-shadow: 0 -0.83em 0 -0.4em, 0 -0.83em 0 -0.42em, 
            0 -0.83em 0 -0.44em, 0 -0.83em 0 -0.46em, 0 -0.83em 0 -0.477em;
            }
        }
        @keyframes round {
            0% { transform: rotate(0deg) }
            100% { transform: rotate(360deg) }
        }

    </style>

    <script>
        function showTextElements() {
            const loadingText = document.getElementById('initial-loading-text');
            const loadingVersion = document.getElementById('initial-loading-version');
            if (loadingText) {
                loadingText.style.opacity = '1';
            }
            if (loadingVersion) {
                loadingVersion.style.opacity = '1';
            }
        }

        // Try to update version text and show text elements when config.version is available
        let loadingVersion = document.getElementById('initial-loading-version');
        if (loadingVersion && config && config.version) {
            loadingVersion.textContent = config.version;
            showTextElements();
        } else {
            let attempts = 0;
            const checkConfig = setInterval(function() {
                loadingVersion = document.getElementById('initial-loading-version');
                if (loadingVersion && config && config.version) {
                    loadingVersion.textContent = config.version;
                    showTextElements();
                    clearInterval(checkConfig);
                }
                attempts++;
                if (attempts > 50) { // Stop after 5 seconds
                    clearInterval(checkConfig);
                }
            }, 100);
        }
    </script>

  </head>
    <body id="vuexambody" style="position: fixed; background-color: #ffffff;">
        <div id="initial-loading-overlay" >
            <div id="initial-loading-spinner">
                <div class="loader">Loading</div>
                <img id="initial-loading-icon" src="./icons/icon-checkmark.png" alt="Next-Exam" />
            </div>
            <div id="initial-loading-text">Next-Exam </div>
            <div id="initial-loading-version"></div>

        </div>

       <!-- quasar:entry-point -->
       

  
    </body>
</html>
